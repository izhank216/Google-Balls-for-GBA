name: GBA Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ROM
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=$DEVKITPRO/devkitARM
          export PATH=$PATH:$DEVKITARM/bin:$DEVKITPRO/tools/bin

          # Adding explicit paths for libgba and libtonc
          arm-none-eabi-gcc -mthumb -mthumb-interwork \
            -I$DEVKITPRO/libgba/include \
            -I$DEVKITPRO/libtonc/include \
            -L$DEVKITPRO/libgba/lib \
            -L$DEVKITPRO/libtonc/lib \
            -specs=gba.specs balls.c -o balls.elf -O3 -ltonc -lgba
          
          arm-none-eabi-objcopy -O binary balls.elf GoogleBalls.gba
          gbafix GoogleBalls.gba

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GoogleBalls-ROM
          path: GoogleBalls.gba
